<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-3LVQBKN9FE"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-3LVQBKN9FE');
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apply for a Trade Account | GACP</title>
  <meta name="description" content="Apply for a GACP LLC trade account in 30 seconds. Access wholesale botanical pricing, CoAs, and ordering.">
  <link rel="icon" href="/images/logo.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/components.css">
  <style>
    .register-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 100vh;
    }
    .register-image {
      position: relative;
      background: url('/images/login-bg.jpg') center/cover no-repeat;
      display: flex;
      align-items: flex-end;
      padding: var(--sp-3xl);
    }
    .register-image::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(12,16,14,0.85), rgba(12,16,14,0.2));
    }
    .register-image__content {
      position: relative;
      z-index: 2;
    }
    .register-form-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--sp-3xl);
      background: var(--ink);
    }
    .register-form-inner {
      width: 100%;
      max-width: 400px;
    }
    .form-subtitle {
      color: var(--text-dim);
      font-size: var(--fs-sm);
      margin-bottom: var(--sp-2xl);
    }
    @media (max-width: 768px) {
      .register-layout { grid-template-columns: 1fr; }
      .register-image { display: none; }
      .register-form-wrap { min-height: 100vh; padding: var(--sp-xl); }
    }
  </style>
</head>
<body>
  <div class="register-layout">

    <!-- Left: Image -->
    <div class="register-image">
      <div class="register-image__content">
        <img src="/images/logo.png" alt="GACP" style="height:80px;margin-bottom:var(--sp-lg)">
        <h2 style="font-size:var(--fs-2xl);max-width:18ch">Trade Pricing, CoAs & Ordering</h2>
        <p style="color:var(--cream-dim);margin-top:var(--sp-sm);font-size:var(--fs-sm)">Apply in 30 seconds. We review applications within 1-2 business days.</p>
      </div>
    </div>

    <!-- Right: Form -->
    <div class="register-form-wrap">
      <div class="register-form-inner">
        <a href="/" style="display:inline-block;margin-bottom:var(--sp-2xl)">
          <img src="/images/logo.png" alt="GACP" style="height:72px">
        </a>

        <h1 style="font-size:var(--fs-2xl);margin-bottom:var(--sp-xs)">Apply for a Trade Account</h1>
        <p class="form-subtitle">Access trade pricing, CoAs, and ordering in 30 seconds.</p>

        <form id="register-form" novalidate>
          <div class="form-group">
            <label class="form-label form-label--required" for="reg-email">Business email</label>
            <input type="email" id="reg-email" class="form-input" required placeholder="you@company.com" autocomplete="email">
          </div>

          <div class="form-group">
            <label class="form-label form-label--required" for="reg-password">Password</label>
            <input type="password" id="reg-password" class="form-input" required minlength="8" placeholder="Min. 8 characters" autocomplete="new-password">
          </div>

          <div class="form-group">
            <label class="form-label form-label--required" for="reg-company">Company name</label>
            <input type="text" id="reg-company" class="form-input" required placeholder="Your company or 'Independent'">
          </div>

          <div class="form-group">
            <label class="form-label form-label--required" for="reg-intended-use">What are you looking for?</label>
            <select id="reg-intended-use" class="form-select" required>
              <option value="" disabled selected>Select intended use</option>
              <option value="retail-manufacturing">Retail / Finished product manufacturing</option>
              <option value="white-label">White label / Private label</option>
              <option value="research">Research &amp; development</option>
              <option value="wholesale-distribution">Wholesale / Distribution</option>
              <option value="formulation">Formulation / Compounding</option>
              <option value="personal">Personal use / Individual purchase</option>
              <option value="other">Other</option>
            </select>
          </div>

          <!-- Honeypot for bots -->
          <div style="position:absolute;left:-9999px" aria-hidden="true">
            <input type="text" name="website_url" tabindex="-1" autocomplete="off">
          </div>

          <label class="register-checkbox">
            <input type="checkbox" id="eligibility-confirm" required>
            <span>I confirm that I am at least 18 years of age (or 21 years of age where required by my state or local law), that I am authorized to purchase botanical ingredients for lawful commercial or research purposes, and that I have read and agree to the <a href="/terms.html" target="_blank" rel="noopener">Terms of Service</a>, <a href="/terms-of-sale.html" target="_blank" rel="noopener">Terms of Sale</a>, and <a href="/privacy.html" target="_blank" rel="noopener">Privacy Policy</a>.</span>
          </label>

          <div id="register-error" class="form-error" style="margin-bottom:var(--sp-md)"></div>

          <button type="submit" class="btn btn--primary btn--full btn--lg" id="register-submit">Apply Now</button>

          <p style="font-size:var(--fs-sm);color:var(--text-dim);text-align:center;margin-top:var(--sp-lg)">
            Already have an account?
            <a href="/login.html" style="color:var(--green);font-weight:500">Sign in</a>
          </p>
        </form>
      </div>
    </div>

  </div>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="/js/config.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/geo.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const already = await redirectIfAuth();
      if (!already) initRegisterPage();
    });
  </script>
  <script src="/js/cookie-banner.js"></script>
</body>
</html>

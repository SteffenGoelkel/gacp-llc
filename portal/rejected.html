<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Application Status — GACP LLC</title>
  <link rel="icon" href="/images/logo.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/components.css">
</head>
<body>
  <div class="page">
    <div id="nav-slot"></div>

    <main class="page-main">
      <div class="container-sm" style="padding-top:var(--sp-5xl);padding-bottom:var(--sp-5xl);text-align:center;max-width:560px;margin:0 auto">

        <div style="width:64px;height:64px;border-radius:50%;background:rgba(224,149,64,0.12);display:flex;align-items:center;justify-content:center;margin:0 auto var(--sp-xl)">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--amber)" stroke-width="2.5">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
        </div>

        <h1 style="font-size:var(--fs-2xl);margin-bottom:var(--sp-md)">Application Not Approved</h1>

        <p style="color:var(--cream-dim);font-size:var(--fs-md);line-height:1.8;margin-bottom:var(--sp-2xl)">
          Your application was not approved at this time. If you believe this is an error
          or would like to provide additional information, please contact us.
        </p>

        <div style="display:flex;flex-direction:column;gap:var(--sp-md);align-items:center">
          <a href="/catalogue.html" class="btn btn--primary btn--pill">Browse Catalogue</a>
          <a href="mailto:info@gacp.llc" class="btn btn--secondary btn--pill">Contact Us</a>
          <button class="btn btn--ghost" id="rejected-logout" style="margin-top:var(--sp-md)">Sign Out</button>
        </div>

      </div>
    </main>

    <div id="footer-slot"></div>
  </div>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="/js/config.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/geo.js"></script>
  <script src="/js/nav.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      initNavigation('', true);

      const session = await getSession();
      if (!session) {
        window.location.href = '/login.html';
        return;
      }

      document.getElementById('rejected-logout').addEventListener('click', (e) => {
        e.preventDefault();
        logout();
      });
    });
  </script>
</body>
</html>

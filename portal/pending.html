<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Application Submitted — GACP LLC</title>
  <link rel="icon" href="/images/logo.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/components.css">
</head>
<body>
  <div class="page">
    <div id="nav-slot"></div>

    <main class="page-main">
      <div class="container-sm" style="padding-top:var(--sp-5xl);padding-bottom:var(--sp-5xl);text-align:center;max-width:560px;margin:0 auto">

        <div style="width:64px;height:64px;border-radius:50%;background:rgba(78,138,86,0.12);display:flex;align-items:center;justify-content:center;margin:0 auto var(--sp-xl)">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="2.5">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </div>

        <h1 style="font-size:var(--fs-2xl);margin-bottom:var(--sp-md)">Application Submitted</h1>

        <p style="color:var(--cream-dim);font-size:var(--fs-md);line-height:1.8;margin-bottom:var(--sp-lg)">
          Thank you for applying for a GACP trade account.
        </p>

        <p style="color:var(--text-dim);font-size:var(--fs-sm);line-height:1.8;margin-bottom:var(--sp-2xl)">
          We review applications within 1–2 business days. You'll receive an email at
          <strong style="color:var(--cream)" id="pending-email">your registered address</strong>
          once your account is approved.
        </p>

        <p style="color:var(--text-dim);font-size:var(--fs-sm);margin-bottom:var(--sp-xl)">In the meantime:</p>

        <div style="display:flex;flex-direction:column;gap:var(--sp-md);align-items:center">
          <a href="/catalogue.html" class="btn btn--primary btn--pill">Browse Our Catalogue</a>
          <a href="mailto:info@gacp.llc" class="btn btn--secondary btn--pill">Contact Us</a>
          <button class="btn btn--ghost" id="pending-logout" style="margin-top:var(--sp-md)">Sign Out</button>
        </div>

      </div>
    </main>

    <div id="footer-slot"></div>
  </div>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="/js/config.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/geo.js"></script>
  <script src="/js/nav.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      initNavigation('', true);

      // Check session and role
      const session = await getSession();
      if (!session) {
        window.location.href = '/login.html';
        return;
      }

      const { data: profile } = await _sb
        .from('profiles')
        .select('role, email')
        .eq('id', session.user.id)
        .single();

      // If no longer pending, redirect to dashboard
      if (profile && profile.role !== 'pending') {
        window.location.href = '/portal/dashboard.html';
        return;
      }

      // Show their email
      const emailEl = document.getElementById('pending-email');
      if (emailEl) emailEl.textContent = profile?.email || session.user.email;

      // Logout button
      document.getElementById('pending-logout').addEventListener('click', (e) => {
        e.preventDefault();
        logout();
      });
    });
  </script>
</body>
</html>
